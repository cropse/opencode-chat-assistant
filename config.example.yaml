# OpenCode Chat Assistant Configuration
# Copy this file to config.yaml and fill in your values.
# Values with colons (like bot tokens) must be quoted.

# Discord platform settings (required)
discord:
  # Bot token from Discord Developer Portal (https://discord.com/developers/applications)
  token: ""
  # Server ID where slash commands will be registered
  serverId: ""
  # Role IDs that can use the bot (list or comma-separated string)
  # allowedRoleIds:
  #   - ""
  # User IDs that can DM the bot directly (list or comma-separated string)
  # allowedUserIds:
  #   - 0

# OpenCode server connection (optional)
# opencode:
#   apiUrl: "http://localhost:4096"
#   username: "opencode"
#   password: ""

# Server settings (optional)
# server:
#   # Logging level: debug, info, warn, error
#   logLevel: "info"

# Bot behavior (optional)
# bot:
#   # UI language: en, de, es, ru, zh
#   locale: "en"
#   # Sessions per page in /sessions
#   sessionsListLimit: 10
#   # Projects per page in /projects
#   projectsListLimit: 10
#   # Models per page in model picker
#   modelsListLimit: 10
#   # Max concurrent active sessions (1-50, default: 10)
#   maxActiveSessions: 10
#   # Service message batching interval in seconds (thinking + tool calls)
#   # Recommended: keep >=2 to reduce risk of hitting rate limits
#   # 0 = send immediately (can hit rate limits with many tool calls)
#   serviceMessagesIntervalSec: 5
#   # Hide thinking indicator messages
#   hideThinkingMessages: false
#   # Hide tool call service messages
#   hideToolCallMessages: false
#   # Assistant message formatting: "markdown" or "raw"
#   messageFormatMode: "markdown"

# Code file settings (optional)
# files:
#   # Maximum file size in KB to send as document
#   maxFileSizeKb: 100
